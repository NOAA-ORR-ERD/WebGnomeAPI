events {
  worker_connections 4096;
}

http {
  # Log format to capture real client IP from ELB
  log_format elb_log '$http_x_forwarded_for - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent"';

  # Send logs to stdout/stderr
  access_log /dev/stdout elb_log;
  error_log /dev/stderr;

  resolver 127.0.0.11 valid=30s ipv6=off;

  # Set real IP from X-Forwarded-For header (ELB)
  set_real_ip_from 10.0.0.0/8;
  set_real_ip_from 172.16.0.0/12;
  set_real_ip_from 192.168.0.0/16;
  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  upstream goods_loadbalance {
      least_conn;
      server goods:5005;
  }

  server {
      listen 80;
      server_name gnome.orr.noaa.gov;
      client_max_body_size 20000G;
      add_header X-Frame-Options "SAMEORIGIN";
      root /usr/share/nginx/html;
      resolver 127.0.0.11:53 ipv6=off valid=5s;

      location /socket.io {
          proxy_http_version 1.1;
          proxy_pass http://api_lb;
          proxy_set_header Upgrade $$http_upgrade;
          proxy_set_header Connection "Upgrade";
      }

      location /logger {
          proxy_http_version 1.1;
          rewrite ^/api(.*)$ $1 break;
          proxy_pass http://api_lb;
          proxy_set_header Upgrade $$http_upgrade;
          proxy_set_header Connection "Upgrade";
      }

      location /step_socket {
          proxy_http_version 1.1;
          rewrite ^/api(.*)$ $1 break;
          proxy_pass http://api_lb;
          proxy_set_header Upgrade $$http_upgrade;
          proxy_set_header Connection "Upgrade";
      }

      location /api {
          rewrite ^/api(.*)$ $1 break;
          proxy_pass http://api_lb;
      }

      location /doc/pygnome {
          rewrite ^/doc/pygnome(.*)$ $1 break;
          proxy_pass http://docs;
      }

      location /py_gnome_testdata {
          autoindex on;
      }

      location / {
          set $$client "http://client:8000";
          proxy_pass $$client;
      }

      location /goods {
          rewrite ^/goods/?(.*)$ /$1 break;
          proxy_pass http://goods_loadbalance;
          proxy_read_timeout 1800;
          proxy_connect_timeout 1800;
          proxy_send_timeout 1800;
          send_timeout 1800;
      }

  }
}